name: Deploy Trinston Salesforce Org

on:
  workflow_dispatch:
    inputs:
      deploy_data:
        description: 'Load data records after metadata deploy?'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli@latest
          sf --version

      - name: Authenticate via Access Token (username + password + token)
        run: |
          # Use OAuth2 username-password flow — works immediately, no pre-auth needed
          RESPONSE=$(curl -s -X POST \
            "https://login.salesforce.com/services/oauth2/token" \
            -d "grant_type=password" \
            -d "client_id=${{ secrets.SF_CONSUMER_KEY }}" \
            -d "client_secret=${{ secrets.SF_CONSUMER_SECRET }}" \
            -d "username=${{ secrets.SF_USERNAME }}" \
            -d "password=${{ secrets.SF_PASSWORD }}${{ secrets.SF_SECURITY_TOKEN }}")
          
          echo "Auth response: $RESPONSE" | python3 -c "
          import sys,json
          text=sys.stdin.read()
          # Extract JSON part
          start=text.find('{')
          d=json.loads(text[start:])
          if 'access_token' in d:
              print('✅ Got access token')
              print(f'Instance: {d[\"instance_url\"]}')
              # Write to env for next steps
              with open('/tmp/sf_token','w') as f:
                  f.write(d['access_token'])
              with open('/tmp/sf_instance','w') as f:
                  f.write(d['instance_url'])
          else:
              print(f'❌ Auth failed: {d}')
              import sys; sys.exit(1)
          "
          
          # Now login to sf cli using the access token
          ACCESS_TOKEN=$(cat /tmp/sf_token)
          INSTANCE=$(cat /tmp/sf_instance)
          
          sf org login access-token \
            --instance-url "$INSTANCE" \
            --alias trinston-dev \
            --set-default \
            --no-prompt << EOF
          $ACCESS_TOKEN
          EOF
          
          echo "✅ SF CLI authenticated"
          sf org display --target-org trinston-dev

      - name: Deploy metadata
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org trinston-dev \
            --wait 30 \
            --ignore-conflicts \
            --json 2>&1 | tee /tmp/deploy_result.json
          
          python3 -c "
          import json,sys
          d=json.load(open('/tmp/deploy_result.json'))
          r=d.get('result',{})
          if d.get('status',1)==0:
              print(f'✅ Deployed {r.get(\"numberComponentsDeployed\",\"?\")} components')
          else:
              for e in r.get('details',{}).get('componentFailures',[]):
                  print(f'❌ {e.get(\"componentType\")}/{e.get(\"fullName\")}: {e.get(\"problem\")}')
              sys.exit(1)
          "

      - name: Load Accounts (250)
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Accounts.json --target-org trinston-dev

      - name: Load Contacts (1000)
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Contacts.json --target-org trinston-dev

      - name: Load Leads (500)
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Leads.json --target-org trinston-dev

      - name: Load Campaigns (100)
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Campaigns.json --target-org trinston-dev

      - name: Load Opportunities (400)
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Opportunities.json --target-org trinston-dev

      - name: Load Cases (600)
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Cases.json --target-org trinston-dev

      - name: Final verification
        run: |
          echo "=== TRINSTON ORG — FINAL RECORD COUNTS ==="
          for OBJ in Account Contact Lead Campaign Opportunity Case; do
            COUNT=$(sf data query --query "SELECT COUNT() FROM $OBJ" --target-org trinston-dev --result-format csv | tail -1)
            echo "  $OBJ: $COUNT"
          done
          echo "✅ Deployment complete — ${{ secrets.SF_INSTANCE_URL }}"
