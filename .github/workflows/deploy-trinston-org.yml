name: Deploy Trinston Salesforce Org

on:
  workflow_dispatch:
    inputs:
      deploy_data:
        description: 'Load data records after metadata deploy?'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli@latest

      - name: Get access token and authenticate
        env:
          SF_USERNAME:        ${{ secrets.SF_USERNAME }}
          SF_PASSWORD:        ${{ secrets.SF_PASSWORD }}
          SF_SECURITY_TOKEN:  ${{ secrets.SF_SECURITY_TOKEN }}
          SF_CONSUMER_KEY:    ${{ secrets.SF_CONSUMER_KEY }}
          SF_CONSUMER_SECRET: ${{ secrets.SF_CONSUMER_SECRET }}
          SF_INSTANCE_URL:    ${{ secrets.SF_INSTANCE_URL }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.parse, json, os, subprocess

          username      = os.environ['SF_USERNAME']
          password      = os.environ['SF_PASSWORD'] + os.environ['SF_SECURITY_TOKEN']
          client_id     = os.environ['SF_CONSUMER_KEY']
          client_secret = os.environ['SF_CONSUMER_SECRET']
          instance_url  = os.environ['SF_INSTANCE_URL']

          # Try instance URL first, then login.salesforce.com
          for auth_url in [f"{instance_url}/services/oauth2/token", "https://login.salesforce.com/services/oauth2/token"]:
              print(f"Trying: {auth_url}")
              data = urllib.parse.urlencode({
                  "grant_type":    "password",
                  "client_id":     client_id,
                  "client_secret": client_secret,
                  "username":      username,
                  "password":      password,
              }).encode()
              req = urllib.request.Request(auth_url, data=data)
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      resp = json.loads(r.read())
                      if 'access_token' in resp:
                          token    = resp['access_token']
                          inst_url = resp['instance_url']
                          print(f"✅ Got token from {auth_url}")
                          print(f"Instance: {inst_url}")
                          
                          # Build SFDX auth URL: force://client_id:client_secret:access_token@instance
                          sfdx_url = f"force://{client_id}:{client_secret}:{token}@{inst_url.replace('https://','')}"
                          
                          with open('/tmp/sfdx_auth_url.txt', 'w') as f:
                              f.write(sfdx_url)
                          print("✅ SFDX URL written")
                          exit(0)
                      else:
                          print(f"❌ Error: {resp}")
              except Exception as e:
                  print(f"  Failed: {e}")

          print("❌ All auth attempts failed")
          exit(1)
          PYEOF

      - name: Login to SF CLI via SFDX URL
        run: |
          sf org login sfdx-url \
            --sfdx-url-file /tmp/sfdx_auth_url.txt \
            --alias trinston-dev \
            --set-default
          echo "✅ Authenticated"
          sf org display --target-org trinston-dev

      - name: Deploy metadata
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org trinston-dev \
            --wait 30 \
            --ignore-conflicts
          echo "✅ Metadata deployed"

      - name: Load Accounts (250)
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Accounts.json --target-org trinston-dev

      - name: Load Contacts (1000)
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Contacts.json --target-org trinston-dev

      - name: Load Leads (500)
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Leads.json --target-org trinston-dev

      - name: Load Campaigns (100)
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Campaigns.json --target-org trinston-dev

      - name: Load Opportunities (400)
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Opportunities.json --target-org trinston-dev

      - name: Load Cases (600)
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Cases.json --target-org trinston-dev

      - name: Final verification
        run: |
          echo "=== TRINSTON ORG — FINAL RECORD COUNTS ==="
          for OBJ in Account Contact Lead Campaign Opportunity Case; do
            COUNT=$(sf data query --query "SELECT COUNT() FROM $OBJ" --target-org trinston-dev --result-format csv | tail -1)
            echo "  $OBJ: $COUNT"
          done
          echo ""
          echo "✅ Trinston org fully deployed"
          echo "Login: ${{ secrets.SF_INSTANCE_URL }}"
