name: Deploy Trinston Salesforce Org

on:
  workflow_dispatch:
    inputs:
      deploy_data:
        description: 'Load data records?'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli@latest

      - name: Authenticate and login to Salesforce
        env:
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_PASSWORD_WITH_TOKEN: ${{ secrets.SF_PASSWORD_WITH_TOKEN }}
          SF_CONSUMER_KEY: ${{ secrets.SF_CONSUMER_KEY }}
          SF_CONSUMER_SECRET: ${{ secrets.SF_CONSUMER_SECRET }}
        run: |
          python3 scripts/sf_auth.py
          if [ -f /tmp/use_sfdx_url ]; then
            sf org login sfdx-url --sfdx-url-file /tmp/sfdx_auth_url.txt --alias trinston-dev --set-default
          fi
          sf org display --target-org trinston-dev

      - name: Deploy custom fields
        run: sf project deploy start --source-dir force-app/main/default/objects --target-org trinston-dev --wait 30 --ignore-conflicts

      - name: Deploy roles
        run: sf project deploy start --source-dir force-app/main/default/roles --target-org trinston-dev --wait 30 --ignore-conflicts

      - name: Deploy queues
        run: sf project deploy start --source-dir force-app/main/default/queues --target-org trinston-dev --wait 30 --ignore-conflicts

      - name: Deploy flow
        run: sf project deploy start --source-dir force-app/main/default/flows --target-org trinston-dev --wait 30 --ignore-conflicts || echo "Flow skipped"

      - name: Deploy reports and dashboards
        run: |
          sf project deploy start --source-dir force-app/main/default/reports --target-org trinston-dev --wait 30 --ignore-conflicts || echo "Reports skipped"
          sf project deploy start --source-dir force-app/main/default/dashboards --target-org trinston-dev --wait 30 --ignore-conflicts || echo "Dashboards skipped"

      - name: Load Accounts
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: |
          sf data import tree             --files data/Accounts.json             --target-org trinston-dev             --api-version 59.0
          sf data query --query "SELECT COUNT() FROM Account" --target-org trinston-dev --result-format human

      - name: Load Contacts
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: |
          sf data import tree --files data/Contacts.json --target-org trinston-dev --api-version 59.0
          sf data query --query "SELECT COUNT() FROM Contact" --target-org trinston-dev --result-format human

      - name: Load Leads
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Leads.json --target-org trinston-dev --api-version 59.0

      - name: Load Campaigns
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Campaigns.json --target-org trinston-dev --api-version 59.0

      - name: Load Opportunities
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Opportunities.json --target-org trinston-dev --api-version 59.0

      - name: Load Cases
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Cases.json --target-org trinston-dev --api-version 59.0

      - name: Final verification
        run: |
          echo "=== TRINSTON ORG RECORD COUNTS ==="
          for OBJ in Account Contact Lead Campaign Opportunity Case; do
            COUNT=$(sf data query --query "SELECT COUNT() FROM $OBJ" --target-org trinston-dev --result-format csv | tail -1)
            echo "  $OBJ: $COUNT"
          done
          echo "=== DEPLOYMENT COMPLETE ==="
