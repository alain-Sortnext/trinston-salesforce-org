name: Deploy Trinston Salesforce Org

on:
  workflow_dispatch:
    inputs:
      deploy_data:
        description: 'Load data records?'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli@latest

      - name: Authenticate to Salesforce
        env:
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_PASSWORD_WITH_TOKEN: ${{ secrets.SF_PASSWORD_WITH_TOKEN }}
        run: python3 scripts/sf_auth.py

      - name: Commit debug file on failure
        if: failure()
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -f auth_debug.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "auth debug [skip ci]"
          git push origin main || true

      - name: Login SF CLI
        run: sf org login sfdx-url --sfdx-url-file /tmp/sfdx_auth_url.txt --alias trinston-dev --set-default

      - name: Deploy metadata
        run: sf project deploy start --source-dir force-app --target-org trinston-dev --wait 30 --ignore-conflicts

      - name: Load Accounts
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Accounts.json --target-org trinston-dev

      - name: Load Contacts
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Contacts.json --target-org trinston-dev

      - name: Load Leads
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Leads.json --target-org trinston-dev

      - name: Load Campaigns
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Campaigns.json --target-org trinston-dev

      - name: Load Opportunities
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Opportunities.json --target-org trinston-dev

      - name: Load Cases
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Cases.json --target-org trinston-dev

      - name: Final verification
        run: |
          for OBJ in Account Contact Lead Campaign Opportunity Case; do
            COUNT=$(sf data query --query "SELECT COUNT() FROM $OBJ" --target-org trinston-dev --result-format csv | tail -1)
            echo "$OBJ: $COUNT"
          done
          echo "Deployment complete"
