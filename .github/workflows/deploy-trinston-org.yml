name: Deploy Trinston Salesforce Org

on:
  workflow_dispatch:
    inputs:
      deploy_data:
        description: 'Load data records?'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli@latest

      - name: Authenticate to Salesforce
        env:
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_PASSWORD_WITH_TOKEN: ${{ secrets.SF_PASSWORD_WITH_TOKEN }}
          SF_CONSUMER_KEY: ${{ secrets.SF_CONSUMER_KEY }}
          SF_CONSUMER_SECRET: ${{ secrets.SF_CONSUMER_SECRET }}
        run: |
          python3 scripts/sf_auth.py
          sf org login sfdx-url --sfdx-url-file /tmp/sfdx_auth_url.txt --alias trinston-dev --set-default
          sf org display --target-org trinston-dev

      - name: Deploy custom fields
        run: sf project deploy start --source-dir force-app/main/default/objects --target-org trinston-dev --wait 30 --ignore-conflicts

      - name: Deploy roles
        run: sf project deploy start --source-dir force-app/main/default/roles --target-org trinston-dev --wait 30 --ignore-conflicts

      - name: Deploy queues
        run: sf project deploy start --source-dir force-app/main/default/queues --target-org trinston-dev --wait 30 --ignore-conflicts

      - name: Deploy flows and reports
        run: |
          sf project deploy start --source-dir force-app/main/default/flows --target-org trinston-dev --wait 30 --ignore-conflicts || true
          sf project deploy start --source-dir force-app/main/default/reports --target-org trinston-dev --wait 30 --ignore-conflicts || true
          sf project deploy start --source-dir force-app/main/default/dashboards --target-org trinston-dev --wait 30 --ignore-conflicts || true

      - name: Load all data via REST API
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: |
          python3 scripts/load_data.py Account data/Accounts.csv Account Name
          python3 scripts/load_data.py Contact data/Contacts.csv Contact LastName
          python3 scripts/load_data.py Lead data/Leads.csv Lead LastName Company
          python3 scripts/load_data.py Campaign data/Campaigns.csv Campaign Name
          python3 scripts/load_data.py Opportunity data/Opportunities.csv Opportunity Name StageName CloseDate
          python3 scripts/load_data.py Case data/Cases.csv Case Subject

      - name: Final verification
        run: |
          echo "=== TRINSTON ORG RECORD COUNTS ==="
          for OBJ in Account Contact Lead Campaign Opportunity Case; do
            COUNT=$(sf data query --query "SELECT COUNT() FROM $OBJ" --target-org trinston-dev --result-format csv | tail -1)
            echo "  $OBJ: $COUNT"
          done
          echo "=== DEPLOYMENT COMPLETE ==="
