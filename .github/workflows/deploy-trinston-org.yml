name: Deploy Trinston Salesforce Org

on:
  workflow_dispatch:
    inputs:
      deploy_data:
        description: 'Load data records after metadata deploy?'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']
  push:
    branches: [main]
    paths: ['force-app/**', 'data/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli@latest

      - name: Write JWT private key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SF_JWT_PRIVATE_KEY }}" > ~/.ssh/sf_server.key
          chmod 600 ~/.ssh/sf_server.key

      - name: Authenticate via JWT (no browser needed)
        run: |
          sf org login jwt \
            --username "${{ secrets.SF_USERNAME }}" \
            --jwt-key-file ~/.ssh/sf_server.key \
            --client-id "${{ secrets.SF_CONSUMER_KEY }}" \
            --instance-url "${{ secrets.SF_INSTANCE_URL }}" \
            --alias trinston-dev \
            --set-default
          echo "✅ Authenticated"
          sf org display --target-org trinston-dev

      - name: Deploy metadata
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org trinston-dev \
            --wait 30 \
            --ignore-conflicts
          echo "✅ Metadata deployed"

      - name: Verify custom fields
        run: |
          sf data query \
            --query "SELECT QualifiedApiName, EntityDefinition.QualifiedApiName FROM FieldDefinition WHERE QualifiedApiName LIKE '%__c%' AND EntityDefinition.QualifiedApiName IN ('Account','Opportunity','Case','Contact','Lead','Campaign') ORDER BY EntityDefinition.QualifiedApiName" \
            --target-org trinston-dev \
            --result-format human

      - name: Load Accounts (250)
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: |
          sf data import tree --files data/Accounts.json --target-org trinston-dev
          COUNT=$(sf data query --query "SELECT COUNT() FROM Account" --target-org trinston-dev --result-format csv | tail -1)
          echo "✅ Accounts in org: $COUNT"

      - name: Load Contacts (1000)
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: |
          sf data import tree --files data/Contacts.json --target-org trinston-dev
          COUNT=$(sf data query --query "SELECT COUNT() FROM Contact" --target-org trinston-dev --result-format csv | tail -1)
          echo "✅ Contacts in org: $COUNT"

      - name: Load Leads (500)
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: |
          sf data import tree --files data/Leads.json --target-org trinston-dev
          COUNT=$(sf data query --query "SELECT COUNT() FROM Lead" --target-org trinston-dev --result-format csv | tail -1)
          echo "✅ Leads in org: $COUNT"

      - name: Load Campaigns (100)
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: |
          sf data import tree --files data/Campaigns.json --target-org trinston-dev
          COUNT=$(sf data query --query "SELECT COUNT() FROM Campaign" --target-org trinston-dev --result-format csv | tail -1)
          echo "✅ Campaigns in org: $COUNT"

      - name: Load Opportunities (400)
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: |
          sf data import tree --files data/Opportunities.json --target-org trinston-dev
          COUNT=$(sf data query --query "SELECT COUNT() FROM Opportunity" --target-org trinston-dev --result-format csv | tail -1)
          echo "✅ Opportunities in org: $COUNT"

      - name: Load Cases (600)
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: |
          sf data import tree --files data/Cases.json --target-org trinston-dev
          COUNT=$(sf data query --query "SELECT COUNT() FROM Case" --target-org trinston-dev --result-format csv | tail -1)
          echo "✅ Cases in org: $COUNT"

      - name: Final record count verification
        run: |
          echo "=== TRINSTON ORG — FINAL RECORD COUNTS ==="
          for OBJ in Account Contact Lead Campaign Opportunity Case; do
            COUNT=$(sf data query --query "SELECT COUNT() FROM $OBJ" --target-org trinston-dev --result-format csv | tail -1)
            echo "  $OBJ: $COUNT"
          done
          echo "✅ Deployment complete"
          echo "Org URL: ${{ secrets.SF_INSTANCE_URL }}"
