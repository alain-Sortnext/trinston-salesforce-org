name: Deploy Trinston Salesforce Org

on:
  workflow_dispatch:
    inputs:
      deploy_data:
        description: 'Load data records?'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli@latest

      - name: Authenticate and login to Salesforce
        env:
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_PASSWORD_WITH_TOKEN: ${{ secrets.SF_PASSWORD_WITH_TOKEN }}
          SF_CONSUMER_KEY: ${{ secrets.SF_CONSUMER_KEY }}
          SF_CONSUMER_SECRET: ${{ secrets.SF_CONSUMER_SECRET }}
        run: |
          python3 scripts/sf_auth.py
          if [ -f /tmp/use_sfdx_url ]; then
            sf org login sfdx-url --sfdx-url-file /tmp/sfdx_auth_url.txt --alias trinston-dev --set-default
          fi
          sf org display --target-org trinston-dev

      - name: Deploy metadata
        run: |
          sf project deploy start             --source-dir force-app             --target-org trinston-dev             --wait 30             --ignore-conflicts             --json 2>&1 | tee /tmp/deploy_out.json | python3 -c "
          import json, sys
          try:
            d = json.load(open('/tmp/deploy_out.json'))
            r = d.get('result', {})
            print(f'Status: {d.get("status")}')
            print(f'Components deployed: {r.get("numberComponentsDeployed",0)}')
            print(f'Component errors: {r.get("numberComponentErrors",0)}')
            for err in r.get('details',{}).get('componentFailures',[]):
              print(f'ERROR: {err.get("componentType")}/{err.get("fullName")}: {err.get("problem")}')
            if d.get('status') == 0:
              print('DEPLOY SUCCESS')
            else:
              print(f'DEPLOY FAILED: {d.get("message","")}')
              sys.exit(1)
          except Exception as e:
            print(f'Parse error: {e}')
            sys.exit(1)
          "

      - name: Load Accounts
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Accounts.json --target-org trinston-dev

      - name: Load Contacts
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Contacts.json --target-org trinston-dev

      - name: Load Leads
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Leads.json --target-org trinston-dev

      - name: Load Campaigns
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Campaigns.json --target-org trinston-dev

      - name: Load Opportunities
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Opportunities.json --target-org trinston-dev

      - name: Load Cases
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Cases.json --target-org trinston-dev

      - name: Final verification
        run: |
          echo "=== TRINSTON ORG RECORD COUNTS ==="
          for OBJ in Account Contact Lead Campaign Opportunity Case; do
            COUNT=$(sf data query --query "SELECT COUNT() FROM $OBJ" --target-org trinston-dev --result-format csv | tail -1)
            echo "  $OBJ: $COUNT"
          done
          echo "Deployment complete"
