name: Deploy Trinston Salesforce Org

on:
  workflow_dispatch:
    inputs:
      deploy_data:
        description: 'Load data records?'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli@latest

      - name: Test connectivity and auth
        env:
          SF_USERNAME:        ${{ secrets.SF_USERNAME }}
          SF_PASSWORD:        ${{ secrets.SF_PASSWORD }}
          SF_SECURITY_TOKEN:  ${{ secrets.SF_SECURITY_TOKEN }}
          SF_CONSUMER_KEY:    ${{ secrets.SF_CONSUMER_KEY }}
          SF_CONSUMER_SECRET: ${{ secrets.SF_CONSUMER_SECRET }}
          SF_INSTANCE_URL:    ${{ secrets.SF_INSTANCE_URL }}
        run: |
          python3 /tmp/does_not_exist.py || true
          
          # Test basic connectivity
          echo "=== Connectivity test ==="
          curl -sv --max-time 10 https://login.salesforce.com/ 2>&1 | grep -E "HTTP|connected|host|SSL" | head -5
          
          echo ""
          echo "=== OAuth attempt ==="
          RESULT=$(curl -s --max-time 30 -X POST https://login.salesforce.com/services/oauth2/token \
            --data-urlencode "grant_type=password" \
            --data-urlencode "client_id=${SF_CONSUMER_KEY}" \
            --data-urlencode "client_secret=${SF_CONSUMER_SECRET}" \
            --data-urlencode "username=${SF_USERNAME}" \
            --data-urlencode "password=${SF_PASSWORD}${SF_SECURITY_TOKEN}")
          
          echo "Response: $RESULT"
          
          # Check if we got a token
          if echo "$RESULT" | grep -q "access_token"; then
            echo "✅ Got access token"
            TOKEN=$(echo $RESULT | python3 -c "import json,sys; print(json.load(sys.stdin)['access_token'])")
            INSTANCE=$(echo $RESULT | python3 -c "import json,sys; print(json.load(sys.stdin)['instance_url'])")
            echo "Instance: $INSTANCE"
            
            # Write SFDX URL
            echo "force://${SF_CONSUMER_KEY}:${SF_CONSUMER_SECRET}:${TOKEN}@${INSTANCE#https://}" > /tmp/sfdx_auth_url.txt
            echo "✅ SFDX URL written"
          else
            echo "❌ Auth failed — see response above"
            exit 1
          fi

      - name: Login SF CLI
        run: |
          sf org login sfdx-url \
            --sfdx-url-file /tmp/sfdx_auth_url.txt \
            --alias trinston-dev \
            --set-default
          sf org display --target-org trinston-dev

      - name: Deploy metadata
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org trinston-dev \
            --wait 30 \
            --ignore-conflicts
          echo "✅ Metadata deployed"

      - name: Load Accounts
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Accounts.json --target-org trinston-dev

      - name: Load Contacts
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Contacts.json --target-org trinston-dev

      - name: Load Leads
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Leads.json --target-org trinston-dev

      - name: Load Campaigns
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Campaigns.json --target-org trinston-dev

      - name: Load Opportunities
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Opportunities.json --target-org trinston-dev

      - name: Load Cases
        if: ${{ github.event.inputs.deploy_data == 'true' }}
        run: sf data import tree --files data/Cases.json --target-org trinston-dev

      - name: Final verification
        run: |
          echo "=== TRINSTON ORG — FINAL RECORD COUNTS ==="
          for OBJ in Account Contact Lead Campaign Opportunity Case; do
            COUNT=$(sf data query --query "SELECT COUNT() FROM $OBJ" --target-org trinston-dev --result-format csv | tail -1)
            echo "  $OBJ: $COUNT"
          done
          echo "✅ Deployment complete"
